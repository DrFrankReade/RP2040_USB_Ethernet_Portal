[platformio]
default_envs = pico-portal-auto
build_dir = ${sysenv.USERPROFILE}/.platformio/build/rp2040-usb-ethernet-portal

[env]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git#develop
framework = picosdk
upload_protocol = picoprobe
debug_tool = picoprobe
debug_speed = 5000
build_src_filter =
    +<*>
    -<main.c>
build_flags =
    -DPIO_STDIO_UART
    -DCFG_TUSB_CONFIG_FILE=\"tusb_config.h\"
extra_scripts =
    pre:scripts/extra_picosdk_sources.py

[portal_mode_auto]
build_flags =
    -DUSB_NET_MODE_ECM_FIRST=1
    -DUSB_NET_CROSS_PLATFORM=1

[portal_mode_android]
build_flags =
    -DUSB_NET_MODE_ECM_ONLY=1

[portal_mode_windows_ncm]
build_flags =
    -DUSB_NET_MODE_NCM=1

[portal_flash_override_example]
; Board flash size comes from the selected PlatformIO board metadata and Pico
; SDK board header. If a custom board definition is wrong, override both the
; linker/size check and SDK macro in that board's env, for example:
; board_upload.maximum_size = 8384512
; build_flags = ${env.build_flags} -DPICO_FLASH_SIZE_BYTES=8388608

[env:pico-portal-auto]
board = pico
build_flags =
    ${env.build_flags}
    ${portal_mode_auto.build_flags}

[env:pico-portal-android]
board = pico
build_flags =
    ${env.build_flags}
    ${portal_mode_android.build_flags}

[env:pico-portal-windows]
board = pico
build_flags =
    ${env.build_flags}
    ${portal_mode_windows_ncm.build_flags}

[env:pico-portal-windows-rndis]
board = pico

[env:kb2040-portal-auto]
board = adafruit_kb2040
build_flags =
    ${env.build_flags}
    ${portal_mode_auto.build_flags}

[env:kb2040-portal-android]
board = adafruit_kb2040
build_flags =
    ${env.build_flags}
    ${portal_mode_android.build_flags}

[env:kb2040-portal-windows]
board = adafruit_kb2040
build_flags =
    ${env.build_flags}
    ${portal_mode_windows_ncm.build_flags}

[env:kb2040-portal-windows-rndis]
board = adafruit_kb2040

[env:kb2040-bootsel]
board = adafruit_kb2040
upload_protocol = picotool
