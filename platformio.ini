[platformio]
default_envs = both

; Keep generated Pico SDK paths out of this OneDrive-backed project path.
; The Pico SDK build can fail on Windows when intermediate paths contain spaces.
build_dir = ${sysenv.USERPROFILE}/.platformio/build/rp2040-usb-ethernet-portal

[env]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git#develop
framework = picosdk
board = ${rp2040_board.id}

; Default upload/debug path for active development: Raspberry Pi Debug Probe over SWD.
upload_protocol = picoprobe
debug_tool = picoprobe
debug_speed = 5000

build_flags =
    -DPIO_STDIO_UART
    -DCFG_TUSB_CONFIG_FILE=\"tusb_config.h\"

extra_scripts =
    pre:scripts/extra_picosdk_sources.py

[rp2040_board]
; Board metadata, including flash size, comes from PlatformIO and the Pico SDK
; board header. Set this to any PlatformIO RP2040 board ID, for example:
;   pico
;   adafruit_kb2040
id = pico

[usb_both]
; Recommended general-purpose mode.
; Starts as Android-friendly CDC-ECM, detects Windows descriptor probing, then
; re-enumerates as RNDIS. This is the best single-image option tested so far.
build_flags =
    -DUSB_NET_MODE_ECM_FIRST=1
    -DUSB_NET_CROSS_PLATFORM=1

[usb_android]
; CDC-ECM only.
; Use for Android/Linux-oriented builds where Windows in-box compatibility is
; not required. Windows generally does not bind this as a network adapter.
build_flags =
    -DUSB_NET_MODE_ECM_ONLY=1

[usb_windows_ncm]
; CDC-NCM only.
; Use for Windows-focused builds when the cleaner NCM adapter identity matters.
; The tested Pixel 6 did not enumerate this mode as a usable network adapter.
build_flags =
    -DUSB_NET_MODE_NCM=1

[usb_network_only]
; Disables the default CDC-ACM serial function.
; Use this when testing phone hosts that reject the composite NIC+serial device.
build_flags =
    -DUSB_PORTAL_ENABLE_CDC_SERIAL=0

; RNDIS mode is the default when no USB_NET_MODE_* flag is set.
; Use it as a Windows fallback or for comparison against adaptive mode. The
; Windows adapter name comes from Microsoft's in-box RNDIS driver.

[env:both]
build_flags =
    ${env.build_flags}
    ${usb_both.build_flags}

[env:both-network-only]
build_flags =
    ${env.build_flags}
    ${usb_both.build_flags}
    ${usb_network_only.build_flags}

[env:android]
build_flags =
    ${env.build_flags}
    ${usb_android.build_flags}

[env:windows-ncm]
build_flags =
    ${env.build_flags}
    ${usb_windows_ncm.build_flags}

[env:windows-rndis]

[env:bootsel]
build_flags =
    ${env.build_flags}
    ${usb_both.build_flags}
upload_protocol = picotool
